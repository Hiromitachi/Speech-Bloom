kind = "web"
previewPath = "/"
title = "SpeechBloom"
version = "1.0.0"
id = "artifacts/speechbloom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22774

[services.development]
run = "pnpm --filter @workspace/speechbloom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/speechbloom", "run", "build" ]
publicDir = "artifacts/speechbloom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22774"
BASE_PATH = "/"
